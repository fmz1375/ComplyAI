<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
// ============================================
// DM CHAT WIDGET - JavaScript
// ============================================

// Configuration (passed from Flask template)
const dmConfig = {
  userId: {{ user_id | default(0) }},
  userName: {{ full_name | default("User") | tojson }},
  apiBaseUrl: ''
};

// State
let dmSocket = null;
let dmIsConnected = false;
let dmChatOpen = false;
let dmConversations = [];
let dmMessages = [];
let dmUsers = [];
let dmCurrentRecipient = null;
let dmUnreadTotal = 0;
let dmTypingTimeout = null;
let dmOnlineUsers = new Set();

// ============================================
// INITIALIZATION
// ============================================

document.addEventListener('DOMContentLoaded', function() {
  if (dmConfig.userId) {
    initDMSocket();
    loadDMConversations();
  }
});

function initDMSocket() {
  if (dmSocket) return;
  
  dmSocket = io({
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionDelay: 1000,
    reconnectionAttempts: 10
  });

  dmSocket.on('connect', () => {
    dmIsConnected = true;
    // Join the DM channel
    dmSocket.emit('dm_connect', {
      user_id: dmConfig.userId,
      user_name: dmConfig.userName
    });
  });

  dmSocket.on('disconnect', () => {
    dmIsConnected = false;
  });

  dmSocket.on('dm_connected', (data) => {
    dmOnlineUsers = new Set(data.online_users || []);
    updateOnlineCount();
  });

  dmSocket.on('dm_user_online', (data) => {
    dmOnlineUsers.add(data.user_id);
    updateOnlineCount();
    updateConversationOnlineStatus(data.user_id, true);
  });

  dmSocket.on('dm_user_offline', (data) => {
    dmOnlineUsers.delete(data.user_id);
    updateOnlineCount();
    updateConversationOnlineStatus(data.user_id, false);
  });

  dmSocket.on('dm_new_message', (data) => {
    handleIncomingDMMessage(data);
  });

  dmSocket.on('dm_typing', (data) => {
    if (data.sender_id === dmCurrentRecipient?.user_id) {
      showTypingIndicator(data.sender_name);
    }
  });

  dmSocket.on('dm_stop_typing', (data) => {
    if (data.sender_id === dmCurrentRecipient?.user_id) {
      hideTypingIndicator();
    }
  });

  dmSocket.on('dm_message_read', (data) => {
    // Update message read status if needed
  });
}

// ============================================
// UI FUNCTIONS
// ============================================

function toggleDMChat() {
  dmChatOpen = !dmChatOpen;
  const panel = document.getElementById('dm-chat-panel');
  
  if (dmChatOpen) {
    panel.classList.add('visible');
    loadDMConversations();
  } else {
    panel.classList.remove('visible');
  }
}

function showConversationsList() {
  document.getElementById('dm-conversations-view').classList.remove('hidden');
  document.getElementById('dm-chat-view').classList.remove('active');
  dmCurrentRecipient = null;
  loadDMConversations();
}

function showUsersModal() {
  document.getElementById('dm-users-modal').classList.add('visible');
  loadDMUsers();
}

function hideUsersModal() {
  document.getElementById('dm-users-modal').classList.remove('visible');
}

function updateOnlineCount() {
  const count = dmOnlineUsers.size;
  document.getElementById('dm-online-count').textContent = `${count} online`;
}

function updateUnreadBadge() {
  const badge = document.getElementById('dm-chat-badge');
  if (dmUnreadTotal > 0) {
    badge.textContent = dmUnreadTotal > 99 ? '99+' : dmUnreadTotal;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

function updateConversationOnlineStatus(userId, isOnline) {
  const item = document.querySelector(`.dm-conversation-item[data-user-id="${userId}"]`);
  if (item) {
    const indicator = item.querySelector('.online-indicator');
    if (indicator) {
      indicator.style.display = isOnline ? 'block' : 'none';
    }
  }
}

// ============================================
// DATA LOADING
// ============================================

async function loadDMConversations() {
  try {
    const res = await fetch(`${dmConfig.apiBaseUrl}/api/dm/conversations`);
    if (!res.ok) throw new Error('Failed to load conversations');
    const data = await res.json();
    dmConversations = data.conversations || [];
    dmUnreadTotal = data.total_unread || 0;
    updateUnreadBadge();
    renderConversations();
  } catch (err) {
    console.error('Error loading conversations:', err);
    renderEmptyState();
  }
}

async function loadDMUsers() {
  try {
    const res = await fetch(`${dmConfig.apiBaseUrl}/api/dm/users`);
    if (!res.ok) throw new Error('Failed to load users');
    const data = await res.json();
    dmUsers = data.users || [];
    renderUsersList();
  } catch (err) {
    console.error('Error loading users:', err);
  }
}

async function loadDMMessages(recipientId) {
  try {
    const res = await fetch(`${dmConfig.apiBaseUrl}/api/dm/messages/${recipientId}`);
    if (!res.ok) throw new Error('Failed to load messages');
    const data = await res.json();
    dmMessages = data.messages || [];
    renderMessages();
    scrollToBottom();
    
    // Mark as read
    if (dmMessages.length > 0) {
      markMessagesAsRead(recipientId);
    }
  } catch (err) {
    console.error('Error loading messages:', err);
  }
}

async function markMessagesAsRead(recipientId) {
  try {
    await fetch(`${dmConfig.apiBaseUrl}/api/dm/messages/${recipientId}/read`, {
      method: 'POST'
    });
    // Update local unread count
    const conv = dmConversations.find(c => c.user_id === recipientId);
    if (conv && conv.unread_count > 0) {
      dmUnreadTotal -= conv.unread_count;
      conv.unread_count = 0;
      updateUnreadBadge();
    }
  } catch (err) {
    console.error('Error marking messages as read:', err);
  }
}

// ============================================
// RENDERING
// ============================================

function renderConversations() {
  const container = document.getElementById('dm-conversations-list');
  
  if (dmConversations.length === 0) {
    container.innerHTML = `
      <div class="dm-empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <h3>No conversations yet</h3>
        <p>Start a new message to begin chatting</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = dmConversations.map(conv => {
    const isOnline = dmOnlineUsers.has(conv.user_id);
    const initials = getInitials(conv.user_name);
    const timeStr = formatTime(conv.last_message_at);
    
    return `
      <div class="dm-conversation-item" data-user-id="${conv.user_id}" onclick="openConversation(${conv.user_id}, '${escapeHtml(conv.user_name)}')">
        <div class="dm-user-avatar">
          ${initials}
          ${isOnline ? '<span class="online-indicator"></span>' : ''}
        </div>
        <div class="dm-conversation-info">
          <div class="dm-conversation-name">${escapeHtml(conv.user_name)}</div>
          <div class="dm-conversation-preview">${escapeHtml(conv.last_message || 'No messages yet')}</div>
        </div>
        <div class="dm-conversation-meta">
          <span class="dm-conversation-time">${timeStr}</span>
          ${conv.unread_count > 0 ? `<span class="dm-unread-badge">${conv.unread_count}</span>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function renderUsersList() {
  const container = document.getElementById('dm-users-list');
  
  // Filter out current user
  const otherUsers = dmUsers.filter(u => u.id !== dmConfig.userId);
  
  if (otherUsers.length === 0) {
    container.innerHTML = `
      <div class="dm-empty-state">
        <h3>No users found</h3>
        <p>There are no other users to chat with</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = otherUsers.map(user => {
    const isOnline = dmOnlineUsers.has(user.id);
    const initials = getInitials(user.full_name);
    
    return `
      <div class="dm-user-item" onclick="startNewConversation(${user.id}, '${escapeHtml(user.full_name)}')">
        <div class="dm-user-avatar">
          ${initials}
          ${isOnline ? '<span class="online-indicator"></span>' : ''}
        </div>
        <div class="dm-user-item-info">
          <div class="dm-user-item-name">${escapeHtml(user.full_name)}</div>
          <div class="dm-user-item-email">${escapeHtml(user.email || '')}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderMessages() {
  const container = document.getElementById('dm-messages-container');
  
  if (dmMessages.length === 0) {
    container.innerHTML = `
      <div class="dm-empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
          <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
        </svg>
        <h3>Start the conversation</h3>
        <p>Send a message to begin</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = dmMessages.map(msg => {
    const isOwn = msg.sender_id === dmConfig.userId;
    const initials = getInitials(msg.sender_name);
    const timeStr = formatTime(msg.created_at);
    
    return `
      <div class="dm-message ${isOwn ? 'own' : ''}">
        <div class="dm-message-avatar">${initials}</div>
        <div class="dm-message-content">
          <div class="dm-message-bubble">${escapeHtml(msg.content)}</div>
          <div class="dm-message-time">${timeStr}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderEmptyState() {
  const container = document.getElementById('dm-conversations-list');
  container.innerHTML = `
    <div class="dm-empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <h3>No conversations yet</h3>
      <p>Start a new message to begin chatting</p>
    </div>
  `;
}

// ============================================
// CHAT ACTIONS
// ============================================

function openConversation(userId, userName) {
  dmCurrentRecipient = { user_id: userId, user_name: userName };
  
  // Update header
  document.getElementById('dm-chat-recipient-name').textContent = userName;
  const isOnline = dmOnlineUsers.has(userId);
  document.getElementById('dm-chat-recipient-status').innerHTML = isOnline 
    ? '<span class="dm-online-dot"></span> Online' 
    : 'Offline';
  
  // Switch view
  document.getElementById('dm-conversations-view').classList.add('hidden');
  document.getElementById('dm-chat-view').classList.add('active');
  
  // Load messages
  loadDMMessages(userId);
  
  // Focus input
  document.getElementById('dm-message-input').focus();
}

function startNewConversation(userId, userName) {
  hideUsersModal();
  openConversation(userId, userName);
}

async function sendDMMessage() {
  const input = document.getElementById('dm-message-input');
  const content = input.value.trim();
  
  if (!content || !dmCurrentRecipient) return;
  
  // Clear input
  input.value = '';
  autoResizeDMInput(input);
  document.getElementById('dm-send-btn').disabled = true;
  
  // Optimistically add message
  const tempMsg = {
    message_id: 'temp_' + Date.now(),
    sender_id: dmConfig.userId,
    sender_name: dmConfig.userName,
    recipient_id: dmCurrentRecipient.user_id,
    content: content,
    created_at: new Date().toISOString()
  };
  dmMessages.push(tempMsg);
  renderMessages();
  scrollToBottom();
  
  // Send via WebSocket (this also saves to database)
  if (dmSocket && dmIsConnected) {
    dmSocket.emit('dm_send_message', {
      sender_id: dmConfig.userId,
      sender_name: dmConfig.userName,
      recipient_id: dmCurrentRecipient.user_id,
      content: content
    });
  } else {
    // Fallback: save via API if WebSocket is not connected
    try {
      await fetch(`${dmConfig.apiBaseUrl}/api/dm/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          recipient_id: dmCurrentRecipient.user_id,
          content: content
        })
      });
    } catch (err) {
      console.error('Error saving message:', err);
    }
  }
}

function handleIncomingDMMessage(data) {
  // Add to messages if currently chatting with this user
  if (dmCurrentRecipient && data.sender_id === dmCurrentRecipient.user_id) {
    dmMessages.push(data);
    renderMessages();
    scrollToBottom();
    markMessagesAsRead(data.sender_id);
  } else {
    // Update unread count and badge
    dmUnreadTotal++;
    updateUnreadBadge();
    
    // Update conversation preview
    const conv = dmConversations.find(c => c.user_id === data.sender_id);
    if (conv) {
      conv.last_message = data.content;
      conv.last_message_at = data.created_at;
      conv.unread_count = (conv.unread_count || 0) + 1;
    } else {
      // New conversation
      dmConversations.unshift({
        user_id: data.sender_id,
        user_name: data.sender_name,
        last_message: data.content,
        last_message_at: data.created_at,
        unread_count: 1
      });
    }
    
    if (dmChatOpen && !dmCurrentRecipient) {
      renderConversations();
    }
  }
}

// ============================================
// TYPING INDICATOR
// ============================================

function emitDMTyping() {
  const input = document.getElementById('dm-message-input');
  const sendBtn = document.getElementById('dm-send-btn');
  
  sendBtn.disabled = !input.value.trim();
  
  if (!dmCurrentRecipient || !dmSocket || !dmIsConnected) return;
  
  dmSocket.emit('dm_typing', {
    sender_id: dmConfig.userId,
    sender_name: dmConfig.userName,
    recipient_id: dmCurrentRecipient.user_id
  });
  
  clearTimeout(dmTypingTimeout);
  dmTypingTimeout = setTimeout(() => {
    dmSocket.emit('dm_stop_typing', {
      sender_id: dmConfig.userId,
      recipient_id: dmCurrentRecipient.user_id
    });
  }, 2000);
}

function showTypingIndicator(name) {
  const indicator = document.getElementById('dm-typing-indicator');
  document.getElementById('dm-typing-text').textContent = `${name} is typing...`;
  indicator.classList.add('visible');
}

function hideTypingIndicator() {
  document.getElementById('dm-typing-indicator').classList.remove('visible');
}

// ============================================
// SEARCH / FILTER
// ============================================

function filterDMConversations(query) {
  const items = document.querySelectorAll('.dm-conversation-item');
  const q = query.toLowerCase();
  
  items.forEach(item => {
    const name = item.querySelector('.dm-conversation-name').textContent.toLowerCase();
    item.style.display = name.includes(q) ? 'flex' : 'none';
  });
}

function filterDMUsers(query) {
  const items = document.querySelectorAll('.dm-user-item');
  const q = query.toLowerCase();
  
  items.forEach(item => {
    const name = item.querySelector('.dm-user-item-name').textContent.toLowerCase();
    const email = item.querySelector('.dm-user-item-email').textContent.toLowerCase();
    item.style.display = (name.includes(q) || email.includes(q)) ? 'flex' : 'none';
  });
}

// ============================================
// HELPERS
// ============================================

function handleDMInputKeydown(event) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    sendDMMessage();
  }
}

function autoResizeDMInput(textarea) {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
}

function scrollToBottom() {
  const container = document.getElementById('dm-messages-container');
  setTimeout(() => {
    container.scrollTop = container.scrollHeight;
  }, 50);
}

function getInitials(name) {
  if (!name) return '?';
  return name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
}

function formatTime(timestamp) {
  if (!timestamp) return '';
  const date = new Date(timestamp);
  const now = new Date();
  const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
  
  if (diffDays === 0) {
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } else if (diffDays === 1) {
    return 'Yesterday';
  } else if (diffDays < 7) {
    return date.toLocaleDateString([], { weekday: 'short' });
  } else {
    return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
  }
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
