<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
// ============================================
// MINI CHAT WIDGET - JavaScript
// ============================================

// Configuration (passed from Flask template)
const miniChatConfig = {
  userId: {{ user_id | default(0) }},
  userName: {{ full_name | default("User") | tojson }},
  apiBaseUrl: ''
};

// State
let miniSocket = null;
let miniIsConnected = false;
let miniChatOpen = false;
let miniConversations = [];
let miniMessages = [];
let miniUsers = [];
let miniCurrentRecipient = null;
let miniUnreadTotal = 0;
let miniTypingTimeout = null;
let miniOnlineUsers = new Set();

// ============================================
// INITIALIZATION
// ============================================

document.addEventListener('DOMContentLoaded', function() {
  if (miniChatConfig.userId) {
    initMiniSocket();
    loadMiniConversations();
  }
});

function initMiniSocket() {
  if (miniSocket) return;
  
  miniSocket = io({
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionDelay: 1000,
    reconnectionAttempts: 10
  });

  miniSocket.on('connect', () => {
    miniIsConnected = true;
    miniSocket.emit('dm_connect', {
      user_id: miniChatConfig.userId,
      user_name: miniChatConfig.userName
    });
  });

  miniSocket.on('disconnect', () => {
    miniIsConnected = false;
  });

  miniSocket.on('dm_connected', (data) => {
    miniOnlineUsers = new Set(data.online_users || []);
    updateMiniOnlineCount();
  });

  miniSocket.on('dm_user_online', (data) => {
    miniOnlineUsers.add(data.user_id);
    updateMiniOnlineCount();
    updateMiniConversationOnlineStatus(data.user_id, true);
  });

  miniSocket.on('dm_user_offline', (data) => {
    miniOnlineUsers.delete(data.user_id);
    updateMiniOnlineCount();
    updateMiniConversationOnlineStatus(data.user_id, false);
  });

  miniSocket.on('dm_new_message', (data) => {
    handleIncomingMiniMessage(data);
  });

  miniSocket.on('dm_typing', (data) => {
    if (data.sender_id === miniCurrentRecipient?.user_id) {
      showMiniTypingIndicator(data.sender_name);
    }
  });

  miniSocket.on('dm_stop_typing', (data) => {
    if (data.sender_id === miniCurrentRecipient?.user_id) {
      hideMiniTypingIndicator();
    }
  });
}

// ============================================
// UI FUNCTIONS
// ============================================

function toggleMiniChat() {
  miniChatOpen = !miniChatOpen;
  const panel = document.getElementById('mini-chat-panel');
  
  if (miniChatOpen) {
    panel.classList.add('visible');
    loadMiniConversations();
  } else {
    panel.classList.remove('visible');
  }
}

function showMiniConversationsList() {
  document.getElementById('mini-conversations-view').classList.remove('hidden');
  document.getElementById('mini-chat-view').classList.remove('active');
  miniCurrentRecipient = null;
  loadMiniConversations();
}

function showMiniUsersModal() {
  document.getElementById('mini-users-modal').classList.add('visible');
  loadMiniUsers();
}

function hideMiniUsersModal() {
  document.getElementById('mini-users-modal').classList.remove('visible');
}

function updateMiniOnlineCount() {
  const count = miniOnlineUsers.size;
  document.getElementById('mini-online-count').textContent = `${count} online`;
}

function updateMiniUnreadBadge() {
  const badge = document.getElementById('mini-chat-badge');
  if (miniUnreadTotal > 0) {
    badge.textContent = miniUnreadTotal > 99 ? '99+' : miniUnreadTotal;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

function updateMiniConversationOnlineStatus(userId, isOnline) {
  const item = document.querySelector(`.mini-conversation-item[data-user-id="${userId}"]`);
  if (item) {
    const indicator = item.querySelector('.online-indicator');
    if (indicator) {
      indicator.style.display = isOnline ? 'block' : 'none';
    }
  }
}

// ============================================
// DATA LOADING
// ============================================

async function loadMiniConversations() {
  try {
    const res = await fetch(`${miniChatConfig.apiBaseUrl}/api/dm/conversations`);
    if (!res.ok) throw new Error('Failed to load conversations');
    const data = await res.json();
    miniConversations = data.conversations || [];
    miniUnreadTotal = data.total_unread || 0;
    updateMiniUnreadBadge();
    renderMiniConversations();
  } catch (err) {
    console.error('Error loading conversations:', err);
    renderMiniEmptyState();
  }
}

async function loadMiniUsers() {
  try {
    const res = await fetch(`${miniChatConfig.apiBaseUrl}/api/dm/users`);
    if (!res.ok) throw new Error('Failed to load users');
    const data = await res.json();
    miniUsers = data.users || [];
    renderMiniUsersList();
  } catch (err) {
    console.error('Error loading users:', err);
  }
}

async function loadMiniMessages(recipientId) {
  try {
    const res = await fetch(`${miniChatConfig.apiBaseUrl}/api/dm/messages/${recipientId}`);
    if (!res.ok) throw new Error('Failed to load messages');
    const data = await res.json();
    miniMessages = data.messages || [];
    renderMiniMessages();
    scrollMiniToBottom();
    
    if (miniMessages.length > 0) {
      markMiniMessagesAsRead(recipientId);
    }
  } catch (err) {
    console.error('Error loading messages:', err);
  }
}

async function markMiniMessagesAsRead(recipientId) {
  try {
    await fetch(`${miniChatConfig.apiBaseUrl}/api/dm/messages/${recipientId}/read`, {
      method: 'POST'
    });
    const conv = miniConversations.find(c => c.user_id === recipientId);
    if (conv && conv.unread_count > 0) {
      miniUnreadTotal -= conv.unread_count;
      conv.unread_count = 0;
      updateMiniUnreadBadge();
    }
  } catch (err) {
    console.error('Error marking messages as read:', err);
  }
}

// ============================================
// RENDERING
// ============================================

function renderMiniConversations() {
  const container = document.getElementById('mini-conversations-list');
  
  if (miniConversations.length === 0) {
    container.innerHTML = `
      <div class="mini-empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <h3>No conversations yet</h3>
        <p>Start a new message to begin chatting</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = miniConversations.map(conv => {
    const isOnline = miniOnlineUsers.has(conv.user_id);
    const initials = getMiniInitials(conv.user_name);
    const timeStr = formatMiniTime(conv.last_message_at);
    
    return `
      <div class="mini-conversation-item" data-user-id="${conv.user_id}" onclick="openMiniConversation(${conv.user_id}, '${escapeMiniHtml(conv.user_name)}')">
        <div class="mini-user-avatar">
          ${initials}
          ${isOnline ? '<span class="online-indicator"></span>' : ''}
        </div>
        <div class="mini-conversation-info">
          <div class="mini-conversation-name">${escapeMiniHtml(conv.user_name)}</div>
          <div class="mini-conversation-preview">${escapeMiniHtml(conv.last_message || 'No messages yet')}</div>
        </div>
        <div class="mini-conversation-meta">
          <span class="mini-conversation-time">${timeStr}</span>
          ${conv.unread_count > 0 ? `<span class="mini-unread-badge">${conv.unread_count}</span>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function renderMiniUsersList() {
  const container = document.getElementById('mini-users-list');
  const otherUsers = miniUsers.filter(u => u.id !== miniChatConfig.userId);
  
  if (otherUsers.length === 0) {
    container.innerHTML = `
      <div class="mini-empty-state">
        <h3>No users found</h3>
        <p>There are no other users to chat with</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = otherUsers.map(user => {
    const isOnline = miniOnlineUsers.has(user.id);
    const initials = getMiniInitials(user.full_name);
    
    return `
      <div class="mini-user-item" onclick="startMiniNewConversation(${user.id}, '${escapeMiniHtml(user.full_name)}')">
        <div class="mini-user-avatar">
          ${initials}
          ${isOnline ? '<span class="online-indicator"></span>' : ''}
        </div>
        <div class="mini-user-item-info">
          <div class="mini-user-item-name">${escapeMiniHtml(user.full_name)}</div>
          <div class="mini-user-item-email">${escapeMiniHtml(user.email || '')}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderMiniMessages() {
  const container = document.getElementById('mini-messages-container');
  
  if (miniMessages.length === 0) {
    container.innerHTML = `
      <div class="mini-empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
          <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
        </svg>
        <h3>Start the conversation</h3>
        <p>Send a message to begin</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = miniMessages.map(msg => {
    const isOwn = msg.sender_id === miniChatConfig.userId;
    const initials = getMiniInitials(msg.sender_name);
    const timeStr = formatMiniTime(msg.created_at);
    
    return `
      <div class="mini-message ${isOwn ? 'own' : ''}">
        <div class="mini-message-avatar">${initials}</div>
        <div class="mini-message-content">
          <div class="mini-message-bubble">${escapeMiniHtml(msg.content)}</div>
          <div class="mini-message-time">${timeStr}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderMiniEmptyState() {
  const container = document.getElementById('mini-conversations-list');
  container.innerHTML = `
    <div class="mini-empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <h3>No conversations yet</h3>
      <p>Start a new message to begin chatting</p>
    </div>
  `;
}

// ============================================
// CHAT ACTIONS
// ============================================

function openMiniConversation(userId, userName) {
  miniCurrentRecipient = { user_id: userId, user_name: userName };
  
  document.getElementById('mini-chat-recipient-name').textContent = userName;
  const isOnline = miniOnlineUsers.has(userId);
  document.getElementById('mini-chat-recipient-status').innerHTML = isOnline 
    ? '<span class="mini-online-dot"></span> Online' 
    : 'Offline';
  
  document.getElementById('mini-conversations-view').classList.add('hidden');
  document.getElementById('mini-chat-view').classList.add('active');
  
  loadMiniMessages(userId);
  document.getElementById('mini-message-input').focus();
}

function startMiniNewConversation(userId, userName) {
  hideMiniUsersModal();
  openMiniConversation(userId, userName);
}

async function sendMiniMessage() {
  const input = document.getElementById('mini-message-input');
  const content = input.value.trim();
  
  if (!content || !miniCurrentRecipient) return;
  
  input.value = '';
  autoResizeMiniInput(input);
  document.getElementById('mini-send-btn').disabled = true;
  
  const tempMsg = {
    message_id: 'temp_' + Date.now(),
    sender_id: miniChatConfig.userId,
    sender_name: miniChatConfig.userName,
    recipient_id: miniCurrentRecipient.user_id,
    content: content,
    created_at: new Date().toISOString()
  };
  miniMessages.push(tempMsg);
  renderMiniMessages();
  scrollMiniToBottom();
  
  if (miniSocket && miniIsConnected) {
    miniSocket.emit('dm_send_message', {
      sender_id: miniChatConfig.userId,
      sender_name: miniChatConfig.userName,
      recipient_id: miniCurrentRecipient.user_id,
      content: content
    });
  } else {
    try {
      await fetch(`${miniChatConfig.apiBaseUrl}/api/dm/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          recipient_id: miniCurrentRecipient.user_id,
          content: content
        })
      });
    } catch (err) {
      console.error('Error saving message:', err);
    }
  }
}

function handleIncomingMiniMessage(data) {
  if (miniCurrentRecipient && data.sender_id === miniCurrentRecipient.user_id) {
    miniMessages.push(data);
    renderMiniMessages();
    scrollMiniToBottom();
    markMiniMessagesAsRead(data.sender_id);
  } else {
    miniUnreadTotal++;
    updateMiniUnreadBadge();
    
    const conv = miniConversations.find(c => c.user_id === data.sender_id);
    if (conv) {
      conv.last_message = data.content;
      conv.last_message_at = data.created_at;
      conv.unread_count = (conv.unread_count || 0) + 1;
    } else {
      miniConversations.unshift({
        user_id: data.sender_id,
        user_name: data.sender_name,
        last_message: data.content,
        last_message_at: data.created_at,
        unread_count: 1
      });
    }
    
    if (miniChatOpen && !miniCurrentRecipient) {
      renderMiniConversations();
    }
  }
}

// ============================================
// TYPING INDICATOR
// ============================================

function emitMiniTyping() {
  const input = document.getElementById('mini-message-input');
  const sendBtn = document.getElementById('mini-send-btn');
  
  sendBtn.disabled = !input.value.trim();
  
  if (!miniCurrentRecipient || !miniSocket || !miniIsConnected) return;
  
  miniSocket.emit('dm_typing', {
    sender_id: miniChatConfig.userId,
    sender_name: miniChatConfig.userName,
    recipient_id: miniCurrentRecipient.user_id
  });
  
  clearTimeout(miniTypingTimeout);
  miniTypingTimeout = setTimeout(() => {
    miniSocket.emit('dm_stop_typing', {
      sender_id: miniChatConfig.userId,
      recipient_id: miniCurrentRecipient.user_id
    });
  }, 2000);
}

function showMiniTypingIndicator(name) {
  const indicator = document.getElementById('mini-typing-indicator');
  document.getElementById('mini-typing-text').textContent = `${name} is typing...`;
  indicator.classList.add('visible');
}

function hideMiniTypingIndicator() {
  document.getElementById('mini-typing-indicator').classList.remove('visible');
}

// ============================================
// SEARCH / FILTER
// ============================================

function filterMiniConversations(query) {
  const items = document.querySelectorAll('.mini-conversation-item');
  const q = query.toLowerCase();
  
  items.forEach(item => {
    const name = item.querySelector('.mini-conversation-name').textContent.toLowerCase();
    item.style.display = name.includes(q) ? 'flex' : 'none';
  });
}

function filterMiniUsers(query) {
  const items = document.querySelectorAll('.mini-user-item');
  const q = query.toLowerCase();
  
  items.forEach(item => {
    const name = item.querySelector('.mini-user-item-name').textContent.toLowerCase();
    const email = item.querySelector('.mini-user-item-email').textContent.toLowerCase();
    item.style.display = (name.includes(q) || email.includes(q)) ? 'flex' : 'none';
  });
}

// ============================================
// HELPERS
// ============================================

function handleMiniInputKeydown(event) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    sendMiniMessage();
  }
}

function autoResizeMiniInput(textarea) {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
}

function scrollMiniToBottom() {
  const container = document.getElementById('mini-messages-container');
  setTimeout(() => {
    container.scrollTop = container.scrollHeight;
  }, 50);
}

function getMiniInitials(name) {
  if (!name) return '?';
  return name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
}

function formatMiniTime(timestamp) {
  if (!timestamp) return '';
  const date = new Date(timestamp);
  const now = new Date();
  const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
  
  if (diffDays === 0) {
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } else if (diffDays === 1) {
    return 'Yesterday';
  } else if (diffDays < 7) {
    return date.toLocaleDateString([], { weekday: 'short' });
  } else {
    return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
  }
}

function escapeMiniHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
