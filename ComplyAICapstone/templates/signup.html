<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComplyAI - Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-50 to-white min-h-screen flex items-center justify-center">

  <!-- Background Accents -->
  <div class="absolute top-0 left-0 w-96 h-96 bg-purple-200 rounded-full blur-3xl opacity-30 -z-10"></div>
  <div class="absolute bottom-0 right-0 w-[28rem] h-[28rem] bg-purple-300 rounded-full blur-3xl opacity-20 -z-10"></div>

  <!-- Signup Card -->
  <div class="bg-white w-full max-w-4xl rounded-2xl shadow-xl p-12 border border-gray-100 flex flex-row gap-12">

    <!-- Left: Branding -->
    <div class="hidden lg:flex flex-col justify-center w-1/2">
      <h1 class="text-5xl font-bold text-purple-600">ComplyAI</h1>
      <p class="text-gray-500 mt-4 text-lg">
        Secure compliance management platform
      </p>
      <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Illustration" class="mt-8 w-3/4">
    </div>

    <!-- Right: Form -->
    <div class="flex-1">
      <h2 class="text-3xl font-bold text-gray-900 mb-6">Create an Account</h2>
      <form method="POST" action="/signup" class="grid grid-cols-2 gap-6">

        <!-- Full Name -->
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
          <input type="text" name="full_name" placeholder="John Doe"
                 class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition">
        </div>

        <!-- Username -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
          <input type="text" name="username" placeholder="john_doe"
                 class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition">
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
          <input type="email" name="email" placeholder="you@company.com"
                 class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition">
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <input type="password" name="password" placeholder="••••••••"
                 class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition">
        </div>

        <!-- Confirm Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
          <input type="password" name="confirm_password" placeholder="••••••••"
                 class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition">
        </div>

        <!-- Submit -->
        <div class="col-span-2">
          <button type="submit"
                  class="w-full bg-purple-600 text-white py-3 rounded-lg font-semibold hover:bg-purple-700 transition shadow-md">
            Sign Up
          </button>
        </div>
      </form>

      <!-- Divider -->
      <div class="my-8 flex items-center">
        <div class="flex-1 border-t border-gray-200"></div>
        <span class="px-4 text-gray-400 text-sm">Already have an account?</span>
        <div class="flex-1 border-t border-gray-200"></div>
      </div>

      <!-- Login Link -->
      <p class="text-center text-sm text-gray-500 mt-2">
        <a href="/login" class="text-purple-600 font-medium hover:text-purple-700">
          Sign In
        </a>
      </p>

    </div>

  </div>
</body>
</html>
