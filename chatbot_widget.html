<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Policy Assistant Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-light: #334155;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --accent: #8b5cf6;
            --success: #10b981;
            --border: #334155;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Floating Chat Button */
        .chat-button {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 9998;
        }

        .chat-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(99, 102, 241, 0.6);
        }

        .chat-button.open {
            transform: rotate(90deg);
        }

        /* Notification Badge */
        .chat-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 20px;
            height: 20px;
            background: #ef4444;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            border: 2px solid white;
        }

        .chat-badge.show {
            display: flex;
        }

        /* Chat Widget Container */
        .chat-widget {
            position: fixed;
            bottom: 100px;
            right: 24px;
            width: 400px;
            height: 600px;
            background: var(--bg);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 9999;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chat-widget.open {
            display: flex;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Widget Header */
        .widget-header {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 1rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .widget-header h3 {
            font-size: 1.125rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: white;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Upload Section */
        .upload-section {
            padding: 0.75rem 1rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .upload-mini {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8125rem;
            color: var(--text-dim);
        }

        .upload-btn {
            background: var(--surface-light);
            border: 1px solid var(--border);
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
            font-size: 0.8125rem;
        }

        .upload-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        #fileInput {
            display: none;
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            display: flex;
            gap: 0.5rem;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.8125rem;
            flex-shrink: 0;
        }

        .user-message .message-avatar {
            background: var(--primary);
            color: white;
        }

        .assistant-message .message-avatar {
            background: var(--accent);
            color: white;
        }

        .message-bubble {
            max-width: 75%;
            padding: 0.625rem 0.875rem;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.875rem;
        }

        .user-message {
            flex-direction: row-reverse;
        }

        .user-message .message-bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant-message .message-bubble {
            background: var(--surface);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        /* Empty State */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.5rem;
            color: var(--text-dim);
        }

        .empty-state-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .empty-state h4 {
            font-size: 0.9375rem;
            margin-bottom: 0.25rem;
            color: var(--text);
        }

        .empty-state p {
            font-size: 0.8125rem;
        }

        .quick-actions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1rem;
            width: 100%;
        }

        .quick-action {
            background: var(--surface);
            padding: 0.625rem 0.875rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            font-size: 0.8125rem;
            text-align: left;
        }

        .quick-action:hover {
            background: var(--surface-light);
            border-color: var(--primary);
        }

        /* Input Area */
        .chat-input {
            padding: 0.875rem 1rem;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
        }

        #messageInput {
            flex: 1;
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.625rem 0.875rem;
            color: var(--text);
            font-size: 0.875rem;
            resize: none;
            max-height: 100px;
            font-family: inherit;
        }

        #messageInput:focus {
            outline: none;
            border-color: var(--primary);
        }

        #messageInput::placeholder {
            color: var(--text-dim);
        }

        #sendBtn {
            background: var(--primary);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        #sendBtn:hover {
            background: var(--primary-dark);
        }

        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading Animation */
        .loading {
            display: flex;
            gap: 0.25rem;
            padding: 0.25rem;
        }

        .loading-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--surface-light);
            border-radius: 3px;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .chat-widget {
                width: calc(100vw - 16px);
                height: calc(100vh - 100px);
                right: 8px;
                bottom: 84px;
            }

            .chat-button {
                right: 16px;
                bottom: 16px;
            }
        }

        /* Powered by footer */
        .powered-by {
            padding: 0.5rem;
            text-align: center;
            font-size: 0.6875rem;
            color: var(--text-dim);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <!-- Floating Chat Button -->
    <button class="chat-button" id="chatButton" onclick="toggleChat()">
        💬
        <span class="chat-badge" id="chatBadge">1</span>
    </button>

    <!-- Chat Widget -->
    <div class="chat-widget" id="chatWidget">
        <!-- Header -->
        <div class="widget-header">
            <h3>
                <span>🤖</span>
                Policy Assistant
            </h3>
            <div class="header-actions">
                <button class="icon-btn" onclick="clearChat()" title="Clear chat">
                    🗑️
                </button>
                <button class="icon-btn" onclick="toggleChat()" title="Close">
                    ✕
                </button>
            </div>
        </div>

        <!-- Upload Section -->
        <div class="upload-section">
            <div class="upload-mini">
                <input type="file" id="fileInput" accept="application/pdf" onchange="uploadFile()">
                <label for="fileInput" class="upload-btn" id="uploadBtn">
                    📎 Upload PDF
                </label>
                <span id="uploadStatus"></span>
            </div>
        </div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chatMessages">
            <div class="empty-state">
                <div class="empty-state-icon">👋</div>
                <h4>Hi! I'm your Policy Assistant</h4>
                <p>Ask me about policies or NIST controls</p>
                <div class="quick-actions">
                    <div class="quick-action" onclick="askQuestion('What is NIST AC-2?')">
                        💡 What is NIST AC-2?
                    </div>
                    <div class="quick-action" onclick="askQuestion('Explain MFA requirements')">
                        🔐 Explain MFA requirements
                    </div>
                    <div class="quick-action" onclick="askQuestion('What are encryption best practices?')">
                        🔒 Encryption best practices
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input">
            <textarea 
                id="messageInput" 
                placeholder="Ask a question..."
                rows="1"
                onkeydown="handleKeyPress(event)"
            ></textarea>
            <button id="sendBtn" onclick="sendMessage()">
                ➤
            </button>
        </div>

        <!-- Powered By -->
        <div class="powered-by">
            Powered by RAG & NIST Controls
        </div>
    </div>

    <script>
        const apiBase = window.location.origin.startsWith("http") ? window.location.origin : "http://127.0.0.1:5002";
        let isLoading = false;
        let isOpen = false;

        function toggleChat() {
            isOpen = !isOpen;
            const widget = document.getElementById('chatWidget');
            const button = document.getElementById('chatButton');
            const badge = document.getElementById('chatBadge');
            
            if (isOpen) {
                widget.classList.add('open');
                button.classList.add('open');
                badge.classList.remove('show');
                document.getElementById('messageInput').focus();
            } else {
                widget.classList.remove('open');
                button.classList.remove('open');
            }
        }

        function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            document.getElementById('uploadStatus').textContent = '⏳ Indexing...';
            document.getElementById('uploadBtn').textContent = '⏳ Processing...';

            fetch(`${apiBase}/api/chatbot/upload`, {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('uploadStatus').textContent = '❌ Error';
                    document.getElementById('uploadBtn').textContent = '📎 Upload PDF';
                } else {
                    document.getElementById('uploadStatus').textContent = '✓ Ready';
                    document.getElementById('uploadBtn').textContent = '✓ ' + data.filename.substring(0, 15);
                }
            })
            .catch(err => {
                document.getElementById('uploadStatus').textContent = '❌ Failed';
                document.getElementById('uploadBtn').textContent = '📎 Upload PDF';
                console.error(err);
            });
        }

        function askQuestion(question) {
            document.getElementById('messageInput').value = question;
            sendMessage();
        }

        function addMessage(role, content) {
            const container = document.getElementById('chatMessages');
            const emptyState = container.querySelector('.empty-state');
            
            if (emptyState) {
                emptyState.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}-message`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? 'U' : 'AI';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            if (content === 'loading') {
                const loading = document.createElement('div');
                loading.className = 'loading';
                loading.innerHTML = '<div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>';
                bubble.appendChild(loading);
            } else {
                bubble.textContent = content;
            }
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            container.appendChild(messageDiv);
            
            container.scrollTop = container.scrollHeight;
            
            return messageDiv;
        }

        async function sendMessage() {
            if (isLoading) return;
            
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            input.value = '';
            input.style.height = 'auto';
            
            // Add user message
            addMessage('user', message);
            
            // Add loading indicator
            const loadingMessage = addMessage('assistant', 'loading');
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;
            
            try {
                const response = await fetch(`${apiBase}/api/chatbot/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message})
                });
                
                const data = await response.json();
                
                // Remove loading message
                loadingMessage.remove();
                
                // Add assistant response
                if (data.error) {
                    addMessage('assistant', 'Sorry, I encountered an error: ' + data.error);
                } else {
                    addMessage('assistant', data.response);
                }
            } catch (err) {
                loadingMessage.remove();
                addMessage('assistant', 'Sorry, I encountered an error. Please try again.');
                console.error(err);
            } finally {
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        function clearChat() {
            fetch(`${apiBase}/api/chatbot/clear`, {method: 'POST'})
            .then(() => {
                const container = document.getElementById('chatMessages');
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👋</div>
                        <h4>Hi! I'm your Policy Assistant</h4>
                        <p>Ask me about policies or NIST controls</p>
                        <div class="quick-actions">
                            <div class="quick-action" onclick="askQuestion('What is NIST AC-2?')">
                                💡 What is NIST AC-2?
                            </div>
                            <div class="quick-action" onclick="askQuestion('Explain MFA requirements')">
                                🔐 Explain MFA requirements
                            </div>
                            <div class="quick-action" onclick="askQuestion('What are encryption best practices?')">
                                🔒 Encryption best practices
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // Show badge on first load
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('chatBadge').classList.add('show');
            }, 2000);
        });
    </script>
</body>
</html>
